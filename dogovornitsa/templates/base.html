{% load static %}
<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/html">
    <head>
        <title>{% block title %}{% endblock %}</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="{% static 'css/base.css' %}">
        <link rel="stylesheet" type="text/css" href="{% static 'css/createDocument.css' %}">
        <link rel="icon" href="data:;base64,="> <!-- удаляет ошибку со значком -->
    </head>
    <body>
        <header class="d-flex justify-content-center py-3">
            <ul class="nav nav-pills">
            <li class="nav-item"><a href="/" class="nav-link" aria-current="page">Главная</a></li>
            <li class="nav-item"><a href="/createDocument" class="nav-link">Создать документ</a></li>
            <li class="nav-item"><a href="/faq" class="nav-link">FAQ</a></li>
            </ul>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            <ul class="nav justify-content-center border-bottom pb-3 mb-3">
              <li class="nav-item"><a href="/" class="nav-link px-2 text-body-secondary">Главная</a></li>
              <li class="nav-item"><a href="/createDocument" class="nav-link px-2 text-body-secondary">Создать договор</a></li>
              <li class="nav-item"><a href="/faq" class="nav-link px-2 text-body-secondary">FAQ</a></li>
            </ul>
            <p class="text-center text-body-secondary">© 2024 Договорница</p>
        </footer>
        {% block scripts %}{% endblock %}
        <script src="{% static 'js/base.js' %}"></script>
    </body>
</html>
